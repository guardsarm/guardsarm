services:
  guardsarm-master:
    build:
      context: .
      dockerfile: base/manager/manager.Dockerfile
    image: integration_test_guardsarm-manager
    hostname: guardsarm-master
    ports:
      - "55000:55000"
    volumes:
      - api_security:/var/guardsarm-manager/api/configuration/security
      - api_ssl:/var/guardsarm-manager/api/configuration/ssl
      - ./configurations/tmp/manager:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - guardsarm-master
      - master-node
      - master

  guardsarm-worker1:
    image: integration_test_guardsarm-manager
    hostname: guardsarm-worker1
    ports:
      - "55001:55000"
    volumes:
      - api_security:/var/guardsarm-manager/api/configuration/security
      - api_ssl:/var/guardsarm-manager/api/configuration/ssl
      - ./configurations/tmp/manager:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - guardsarm-master
      - worker1
      - worker
    depends_on:
      - guardsarm-master

  guardsarm-worker2:
    image: integration_test_guardsarm-manager
    hostname: guardsarm-worker2
    ports:
      - "55002:55000"
    volumes:
      - api_security:/var/guardsarm-manager/api/configuration/security
      - api_ssl:/var/guardsarm-manager/api/configuration/ssl
      - ./configurations/tmp/manager:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - guardsarm-master
      - worker2
      - worker
    depends_on:
      - guardsarm-master

  guardsarm-agent1:
    build:
      context: .
      dockerfile: base/agent/new.Dockerfile
    image: integration_test_guardsarm-agent
    hostname: guardsarm-agent1
    volumes:
      - ./configurations/tmp/agent:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - haproxy-lb
      - guardsarm-agent1
    depends_on:
      - haproxy-lb

  guardsarm-agent2:
    image: integration_test_guardsarm-agent
    hostname: guardsarm-agent2
    volumes:
      - ./configurations/tmp/agent:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - haproxy-lb
      - guardsarm-agent2
    depends_on:
      - guardsarm-agent1
      - haproxy-lb

  guardsarm-agent3:
    image: integration_test_guardsarm-agent
    hostname: guardsarm-agent3
    volumes:
      - ./configurations/tmp/agent:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - haproxy-lb
      - guardsarm-agent3
    depends_on:
      - guardsarm-agent2
      - haproxy-lb

  guardsarm-agent4:
    image: integration_test_guardsarm-agent
    hostname: guardsarm-agent4
    volumes:
      - ./configurations/tmp/agent:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - haproxy-lb
      - guardsarm-agent4
    depends_on:
      - guardsarm-agent3
      - haproxy-lb

  guardsarm-agent5:
    build:
      context: .
      dockerfile: base/agent/old.Dockerfile
    image: integration_test_guardsarm-agent_old
    hostname: guardsarm-agent5
    volumes:
      - ./configurations/tmp/agent:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - haproxy-lb
      - guardsarm-agent5
      - agent_old
    depends_on:
      - guardsarm-agent4
      - haproxy-lb

  guardsarm-agent6:
    image: integration_test_guardsarm-agent_old
    hostname: guardsarm-agent6
    volumes:
      - ./configurations/tmp/agent:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - haproxy-lb
      - guardsarm-agent6
      - agent_old
    depends_on:
      - guardsarm-agent5
      - haproxy-lb

  guardsarm-agent7:
    image: integration_test_guardsarm-agent_old
    hostname: guardsarm-agent7
    volumes:
      - ./configurations/tmp/agent:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - haproxy-lb
      - guardsarm-agent7
      - agent_old
    depends_on:
      - guardsarm-agent6
      - haproxy-lb

  guardsarm-agent8:
    image: integration_test_guardsarm-agent_old
    hostname: guardsarm-agent8
    volumes:
      - ./configurations/tmp/agent:/tmp_volume
      - ./tools/:/tools
    entrypoint:
      - /scripts/entrypoint.sh
      - haproxy-lb
      - guardsarm-agent8
      - agent_old
    depends_on:
      - guardsarm-agent7
      - haproxy-lb

  haproxy-lb:
    build:
      context: ./base/haproxy-lb
    image: integration_test_haproxy-lb
    ports:
      - "1514:1514"
      - "1515:1515"
      - "55010:55000"
    entrypoint:
      - /scripts/entrypoint.sh
    depends_on:
      - guardsarm-master
      - guardsarm-worker1
      - guardsarm-worker2

volumes:
  api_ssl:
  api_security:
