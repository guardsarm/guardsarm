<agent_config>

  <!-- Shared agent configuration (baked into the manager image; pushed to agents
       in the 'default' group via merged.mg). -->
  <!-- Report established network connections (with their remote peers) via
       syscollector so the Command Center Endpoint Threat Map is built from real
       agent telemetry (not a host-side script). ports all="yes" = listening +
       established; process names are resolved server-side via process inventory. -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>15m</interval>
    <scan_on_start>yes</scan_on_start>
    <hardware>yes</hardware>
    <os>yes</os>
    <network>yes</network>
    <packages>yes</packages>
    <ports all="yes">yes</ports>
    <processes>yes</processes>
  </wodle>

</agent_config>
